name: Production Deploy

on:
  push:
    branches:
      - production

permissions:
  contents: write # Needed for release
  actions: read

env:
  NX_DAEMON: "false" # disables NX daemon
  NX_NO_CLOUD: "true" # disables NX cloud
  NX_SKIP_NX_CACHE: "false" # enables NX cache
  AWS_REGION: us-east-1

jobs:
  main:
    name: production deploy
    runs-on: ubuntu-latest
    environment: production
    env:
      # For AWS backend/provider auth
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # For Cloudflare (Wrangler)
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json" # Automatically reads the engines field
          cache: "npm"

      - run: npm ci --legacy-peer-deps
      - uses: nrwl/nx-set-shas@v4

      - name: Show affected projects
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          echo "NX_BASE=$NX_BASE"
          echo "NX_HEAD=$NX_HEAD"
          npx nx show projects --affected
        timeout-minutes: 10

      - name: production-deploy (affected)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        continue-on-error: true
        timeout-minutes: 30
        run: |
          npx nx affected run-many -t deploy --configuration=production
